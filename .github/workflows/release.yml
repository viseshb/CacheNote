name: Release

# Push to master → semantic-release reads the conventional-commit messages since the
# last v* tag and decides whether to release and what the next version is:
#   feat: → minor, fix:/perf:/refactor:/revert: → patch, BREAKING → major,
#   chore:/docs:/style:/test:/build:/ci: → NO release.
# When a release is warranted it builds the self-contained installer stamped with the
# computed version, creates the v<x.y.z> tag, and publishes a GitHub Release with
# CacheNoteSetup.exe attached. The in-app updater (M10) reads releases/latest.
# A push with only non-releasing commits produces NO release → no update prompt.
on:
  push:
    branches: [ master ]
  workflow_dispatch:

# Only release on the owner's commits, never re-run/dispatch by a collaborator.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # semantic-release needs full history + tags

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Install semantic-release
        run: npm install

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
